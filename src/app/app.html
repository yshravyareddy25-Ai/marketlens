<div class="dash">
  <header class="bar">
    <div class="logo">Market<span>Lens</span></div>
    <div class="tag">AI Financial Insights · live stream</div>
  </header>

  <div class="search">
    <input
      [(ngModel)]="query"
      (keydown.enter)="run()"
      placeholder="Enter a company or market topic — e.g. 'Tesla Q3 outlook'"
      [disabled]="state.isStreaming()" />
    <button (click)="run()" [disabled]="state.isStreaming() || !query.trim()">
      {{ state.isStreaming() ? 'Streaming…' : 'Analyze' }}
    </button>
  </div>

  <!-- status row -->
  <div class="status" *ngIf="state.status() !== 'idle'">
    <span class="dot" [class.live]="state.isStreaming()"></span>
    <span>{{ state.status() }}</span>
    <span class="wc" *ngIf="state.wordCount() > 0">{{ state.wordCount() }} words</span>
  </div>

  <!-- error -->
  <div class="err" *ngIf="state.status() === 'error'">
    {{ state.errorMsg() }}
  </div>

   <!-- the live-streaming panels -->
  <div class="panels" *ngIf="state.panels().length > 0">
    <div class="panel" *ngFor="let p of state.panels(); let i = index">
      <div class="panel-num">{{ i + 1 }}</div>
      <div class="panel-content" [innerHTML]="p"></div>
    </div>
  </div>

  <!-- empty state -->
  <div class="empty" *ngIf="state.status() === 'idle'">
    Enter a topic above to stream a live AI market analysis.
  </div>

  <!-- stock chart -->
  <div class="stock-box" *ngIf="state.quote()">
    <app-stock-chart [quote]="state.quote()"></app-stock-chart>
  </div>
  </div>
